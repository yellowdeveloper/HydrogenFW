CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_NRFX=y

CONFIG_CBPRINTF_FP_SUPPORT=y

# ADD BLUETOOTH SUPPORT
CONFIG_BT=y
# CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="HydroB/D"

CONFIG_BT_L2CAP_TX_MTU=247

CONFIG_BT_BUF_ACL_RX_SIZE=255
CONFIG_BT_BUF_ACL_TX_SIZE=251

# Enable using File System
CONFIG_FILE_SYSTEM=y
# Enable LittleFS for internal Flash File System
CONFIG_FILE_SYSTEM_LITTLEFS=y
# Enable FS in Flash memory
CONFIG_FS_LITTLEFS_FMP_DEV=y

# Enable Editing Flash area in code level
# Need to configure because we will use remain Flash space as FS
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# !!ESSENTIAL!!
# Mounting LittleFS, requires large stack size (lots of function call, lots of local variables used while mounting little fs)
CONFIG_MAIN_STACK_SIZE=4096

#CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

